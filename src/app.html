<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0f1e" />

    <!-- Primary SEO -->
    <title>%sveltekit.head%</title>
    <meta name="description" content="INDU — The Universal Language & Framework. Write with Python's ease, scale with Erlang's fault-tolerance, execute with C's speed." />
    <meta name="keywords" content="INDU, programming language, WebGPU, agent-oriented, CRDT, Svelte, systems programming, AI" />
    <meta name="author" content="INDU Foundation" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://indu-foundation.pages.dev" />
    <meta property="og:title" content="INDU — The Universal Language & Framework" />
    <meta property="og:description" content="Write with Python's ease, scale with Erlang's fault-tolerance, execute with C's speed." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@indu_lang" />
    <meta name="twitter:title" content="INDU — The Universal Language & Framework" />
    <meta name="twitter:description" content="Write with Python's ease, scale with Erlang's fault-tolerance, execute with C's speed." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- LLM-friendly ingestion -->
    <link rel="alternate" type="application/json" href="/llms.txt" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
